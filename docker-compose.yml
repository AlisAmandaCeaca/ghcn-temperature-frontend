services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CACHE_DIR=/cache
      - META_TTL_SECONDS=604800
      - STATION_TTL_SECONDS=2592000
      - HTTP_TIMEOUT_Sec=60
    volumes:
      - cache:/cache
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  cache:
